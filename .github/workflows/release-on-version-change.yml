name: Release On Version Change

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Detect version change
        id: version
        shell: bash
        run: |
          current_version=$(node -p "require('./package.json').version")
          before_sha='${{ github.event.before }}'

          if [ -n "$before_sha" ] \
            && [ "$before_sha" != '0000000000000000000000000000000000000000' ] \
            && git cat-file -e "${before_sha}:package.json" 2>/dev/null; then
            previous_version=$(git show "${before_sha}:package.json" | node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.version)")
          else
            previous_version=''
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" != "$previous_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $previous_version -> $current_version"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $current_version"
          fi

      - name: Check tag existence
        if: steps.version.outputs.changed == 'true'
        id: tag_check
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists: $tag"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag does not exist yet: $tag"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true' && steps.tag_check.outputs.exists != 'true'
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"

      - name: Skip release
        if: steps.version.outputs.changed != 'true'
        run: echo "No version change detected, skipping release."

      - name: Tag already released
        if: steps.version.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'true'
        run: echo "Release tag already exists, skipping tag creation."
